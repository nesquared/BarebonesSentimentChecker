<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sentiment Checker</title>
</head>
<body>
  <h1>Sentiment Checker</h1>
  <p>Are you being positive/negative?</p>
  <input id="statement" placeholder="Enter statement">
  <button onclick="processInput()">Check</button>
  <p id="output"></p>

  <script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js";

    // Load the pipeline once
    const classifier = await pipeline(
      "sentiment-analysis",
      "Xenova/distilbert-base-uncased-finetuned-sst-2-english"
    );

    window.processInput = async function () {
      let statement = document.getElementById("statement").value;
      const result = await classifier(statement);
      document.getElementById("output").innerText =
        `${result[0].label}, with ${result[0].score.toFixed(3)*100}% certainty`;
    };
  </script>
</body>
</html>
